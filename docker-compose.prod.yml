# Production overrides — used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# This file only declares what CHANGES in production; everything else inherits
# from docker-compose.yml.

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod        # multi-stage: Vite build → nginx static
    ports: []                            # don't expose 3000 directly in prod
    restart: unless-stopped
    environment: []                      # no VITE_* env vars needed at runtime

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod        # gunicorn + 4 uvicorn workers
    volumes: []                          # remove dev source-mount (baked into image)
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf

volumes:
  redis_data:
