name: Deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Only one deploy can run at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Tests must pass before deploy starts
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    environment: production   # requires environment protection rules in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            cd /opt/stocksim

            echo "── Pulling latest code ──────────────────────────────"
            git fetch origin master
            git reset --hard origin/master

            echo "── Writing env file ─────────────────────────────────"
            cat > .env <<ENV
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            WEB_CONCURRENCY=4
            ENV

            echo "── Building and restarting containers ───────────────"
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --build --remove-orphans

            echo "── Removing dangling images ─────────────────────────"
            docker image prune -f

            echo "── Health check ─────────────────────────────────────"
            sleep 10
            curl -sf http://localhost/api/health || (echo "Health check failed!" && exit 1)

            echo "── Deploy complete ──────────────────────────────────"
