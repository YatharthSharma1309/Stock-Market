name: Deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail

            cd /opt/stocksim

            echo "[deploy] pulling latest code"
            git fetch origin master
            git reset --hard origin/master

            echo "[deploy] writing environment file"
            cat > .env <<ENV
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            DOMAIN=${{ secrets.DOMAIN }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            WEB_CONCURRENCY=${{ secrets.WEB_CONCURRENCY || '4' }}
            BACKUP_RETAIN_DAYS=${{ secrets.BACKUP_RETAIN_DAYS || '7' }}
            JSON_LOGS=true
            ENV

            echo "[deploy] building and restarting containers"
            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"
            if [ -f "/etc/letsencrypt/live/${{ secrets.DOMAIN }}/fullchain.pem" ]; then
              echo "[deploy] SSL certificates found — enabling HTTPS overlay"
              COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.https.yml"
              HEALTH_URL="https://${{ secrets.DOMAIN }}/api/health"
            else
              HEALTH_URL="http://localhost/api/health"
            fi
            docker compose $COMPOSE_FILES up -d --build --remove-orphans

            echo "[deploy] removing dangling images"
            docker image prune -f

            echo "[deploy] checking health"
            sleep 10
            curl -sf "$HEALTH_URL"

            echo "[deploy] complete"
