name: Lighthouse CI

on:
  push:
    branches: ["master", "main"]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Serve production build
        working-directory: frontend
        run: |
          npm install -g serve
          serve -s dist -l 5000 &
          echo "Waiting for server..."
          npx wait-on http://localhost:5000 --timeout 30000

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:5000 \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=["warn",{"minScore":0.9}] \
            --assert.assertions.categories:accessibility=["warn",{"minScore":0.9}] \
            --assert.assertions.categories:best-practices=["warn",{"minScore":0.9}] \
            --upload.target=temporary-public-storage
